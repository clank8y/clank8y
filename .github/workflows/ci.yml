name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --include-workspace-root build

      - name: Test
        run: pnpm -r --include-workspace-root test:run

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r --include-workspace-root typecheck



  deploy-preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ !github.event.pull_request.head.repo.fork }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter ./website build

      - name: Compute preview alias
        id: alias
        run: |
          slug="${{ github.head_ref }}"
          slug="${slug//[^a-zA-Z0-9]/-}"  # replace anything not alphanumeric with -
          slug="${slug,,}"                 # lowercase
          echo "value=$slug" >> "$GITHUB_OUTPUT"

      - name: Delete previous Cloudflare preview
        working-directory: website
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm exec wrangler preview delete \
            --name "${{ steps.alias.outputs.value }}" \
            --worker-name clank8y-website \
            --skip-confirmation

      - name: Create Cloudflare preview
        working-directory: website
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm exec wrangler preview \
            --name "${{ steps.alias.outputs.value }}" \
            --worker-name clank8y-website \
            --message "preview ${{ steps.alias.outputs.value }} (${{ github.sha }})"



