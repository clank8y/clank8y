name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # required for npm provenance + clank8y OIDC (action build)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --include-workspace-root build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r --include-workspace-root typecheck

      - name: Test
        run: pnpm -r --include-workspace-root test:run

      - name: Publish clank8y to npm
        run: pnpm --filter clank8y publish --access public --no-git-checks --provenance

      - name: Deploy website with Wrangler
        working-directory: website
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec wrangler deploy --message "production release ${{ github.ref_name }}"

      - name: Create GitHub Release
        run: pnpm changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}