name: clank8y
description: Reviews your pull requests for Cumulocity IoT projects 
author: schplitt

inputs:
  prompt:
    description: Event-level instruction block injected by the clank8y webhook server. Contains trigger metadata, target context, actor, and optional quoted user instruction. Do not set this manually.
    required: true
  model:
    description: Model to use for the agent. Optional — defaults to anthropic:claude-sonnet-4-20250514. Use provider:model-id format.
    required: false
  timeout-ms:
    description: Maximum time in milliseconds for the entire PR review process. Optional — defaults to 1200000 (20 minutes).
    required: false

runs:
  using: node24
  main: ./dist/index.mjs
