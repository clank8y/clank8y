  - ./packages/clank8y
  - ./website
  - ./packages/*
catalog:
  '@actions/core': ^3.0.1
  '@actions/github': ^9.1.1
  '@angular/cli': ^21.2.11
  '@earendil-works/pi-agent-core': ^0.75.3
  '@earendil-works/pi-ai': ^0.75.3
  '@octokit/auth-app': ^8.2.0
  '@octokit/webhooks': ^14.2.0
  '@schplitt/eslint-config': ^1.5.1
  '@toon-format/toon': ^2.2.0
  '@types/node': ^24.10.4
  '@valibot/to-json-schema': ^1.7.0
  bumpp: ^11.1.0
  changelogithub: ^14.0.0
  consola: ^3.4.2
  defu: ^6.1.7
  dotenv: ^17.4.2
  eslint: ^10.4.0
  jose: ^6.2.3
  nitro: 3.0.1-alpha.2
  octokit: ^5.0.5
  rolldown: 1.0.0-rc.5
  tinyexec: ^1.1.2
  tsdown: ^0.22.0
  typebox: ^1.1.38
  typescript: ^6.0.3
  valibot: ^1.4.0
  vitest: ^4.1.6
  wrangler: ^4.92.0
